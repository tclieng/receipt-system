# render.yaml - Render.com Auto-Deploy Configuration
#
# Uses Docker (Dockerfile) instead of native Python.
# Required because Render's native Python build env is non-root and
# cannot run `apt-get install` (Tesseract is a system package).
# Docker builds run as root, so Tesseract installs cleanly.

services:
  - type: web
    name: receipt-system
    env: docker
    region: singapore
    plan: free
    # Docker handles build (Dockerfile) and start (CMD), so no buildCommand
    # or startCommand needed here.
    healthCheckPath: /dashboard
