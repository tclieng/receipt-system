# render.yaml - Render.com Auto-Deploy Configuration
# Deploys Flask app with persistent SQLite database
# EasyOCR + PyTorch CPU (reverted from Tesseract/RapidOCR after
# sys-lib install difficulties in Render's build env).

services:
  - type: web
    name: receipt-system
    env: python
    region: singapore
    plan: free
    buildCommand: bash build.sh
    # gunicorn flags: 1 worker (PyTorch loads ~400MB), threads for concurrency,
    # longer timeout for first OCR scan (model loads + scan takes time).
    startCommand: gunicorn web.app:app --bind 0.0.0.0:$PORT --worker-class gthread --workers 1 --threads 2 --timeout 300 --graceful-timeout 60 --keep-alive 5 --access-logfile - --error-logfile -
    healthCheckPath: /dashboard
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
